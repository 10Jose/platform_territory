services:
  ms-ingestion:
    build: ./ms-ingestion
    ports:
      - "8000:8000"

  ms-transformation:
    build: ./ms-transformation
    ports:
      - "8001:8001"
    depends_on:
      - ms-ingestion

  bff-gateway:
    build: ./bff-gateway
    ports:
      - "8002:8002"
    depends_on:
      - ms-ingestion
      - ms-transformation